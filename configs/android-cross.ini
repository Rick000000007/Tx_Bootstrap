; Meson cross-compilation file for Android
; Generated by TX-Packages build system
; Target: aarch64-linux-android

[binaries]
c = 'aarch64-linux-android29-clang'
cpp = 'aarch64-linux-android29-clang++
ar = 'llvm-ar'
strip = 'llvm-strip'
ranlib = 'llvm-ranlib'
ld = 'ld.lld'
pkgconfig = 'pkg-config'

[host_machine]
system = 'android'
cpu_family = 'aarch64'
cpu = 'armv8-a'
endian = 'little'

[properties]
needs_exe_wrapper = true
sys_root = '/opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/sysroot'

[built-in options]
c_args = ['-fPIC', '-O2']
cpp_args = ['-fPIC', '-O2', '-stdlib=libc++']
c_link_args = ['-fuse-ld=lld']
cpp_link_args = ['-fuse-ld=lld', '-stdlib=libc++']
